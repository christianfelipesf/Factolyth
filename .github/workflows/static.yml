name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# CORREÇÃO AQUI: Agora, se você subir outro código, ele cancela o deploy antigo e evita duplicidade de artefatos
concurrency:
  group: "pages"
  cancel-in-progress: true 

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Rename entry point to index.html
        run: |
          if [ -f "html/Factolyth.html" ]; then
            mv html/Factolyth.html html/index.html
          fi

      # Atualizado para v3 (Garante compatibilidade e estabilidade)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'html'

      # Atualizado para v4 (Evita bugs de API do GitHub com artefatos múltiplos)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
